<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>崖登りクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #e8c87a;
    --accent-dark: #b8923a;
    --text-main: #1a1209;
    --text-light: #f5f0e8;
    --card-bg: rgba(245, 240, 230, 0.97);
    --font-serif: 'Noto Serif JP', serif;
    --font-sans: 'Noto Sans JP', sans-serif;

    /* ── 調整用変数 ──────────────────────────────
       SKY_IMAGE_HEIGHT_PX : sky.png の実際の縦px
       CLIFF_STRIP_WIDTH   : 崖画像の横幅（画面幅に対する%）
       ────────────────────────────────────────── */
    --sky-image-height: 3000px; /* sky.png の実際の高さに合わせる */
    --cliff-w: 100%;             /* 崖の横幅 */
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d0a06;
    font-family: var(--font-sans);
    color: var(--text-main);
  }

  /* ══════════════════════════════
     背景レイヤー（sky.png 1枚）
     下端を基準に上へスクロール
  ══════════════════════════════ */
  #bg-layer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }
  #bg-img {
    position: absolute;
    left: 0;
    width: 100%;
    height: var(--sky-image-height);
    object-fit: cover;
    object-position: center bottom;
    /* 初期位置：画像の下端を画面下端に揃える */
    bottom: 0;
    transform: translateY(0px);
    transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  /* ══════════════════════════════
     崖レイヤー（cliff.png 繰り返し・前面）
     透過PNGを画面左に縦に並べる
  ══════════════════════════════ */
  #cliff-layer {
    position: fixed;
    left: 0;
    top: 0;
    width: var(--cliff-w);
    height: 100%;
    overflow: hidden;
    z-index: 2; /* 背景より前面 */
    pointer-events: none;
  }
  #cliff-strip {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    /* パネルを下から積み上げる */
    display: flex;
    flex-direction: column-reverse;
    transform: translateY(0px);
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .cliff-panel {
    width: 100%;
    flex-shrink: 0;
    /* cliff.png を繰り返し表示（高さはJSで設定） */
    background: url('cliff001.png') right center / 100% auto no-repeat;
  }
  /* 頂上パネルだけ別画像 */
  .cliff-panel.summit {
    background: url('cliff_summit.png') right top / 100% auto no-repeat;
  }

  /* 地面ライン */
  #ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%);
    border-top: 2px solid rgba(255,255,255,0.1);
    z-index: 3;
  }

  /* 進行バー */
  #progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.8s ease;
  }

  /* 問題カウンター */
  #counter {
    position: fixed;
    top: 12px; right: 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-family: var(--font-sans);
    z-index: 100;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  /* ── クイズカード ── */
  #quiz-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: flex-end;
    padding: 0 0 56px 0;
    pointer-events: none;
  }
  #quiz-card {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 20px;
    pointer-events: all;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    transform: translateY(0);
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
  }
  #quiz-card.hidden, #quiz-card.scrolling {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--font-sans);
  }
  #question-text {
    font-family: var(--font-serif);
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-main);
    margin-bottom: 16px;
    min-height: 48px;
  }
  #answer-input {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: var(--font-sans);
    border: 1.5px solid #d0c8b8;
    border-radius: 10px;
    background: #fff;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #answer-input:focus { border-color: var(--accent-dark); }
  #answer-input:disabled { background: #f0ece4; color: #888; }

  #submit-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: var(--text-main);
    color: var(--text-light);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.4; cursor: default; }

  #result-area {
    display: none;
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    font-family: var(--font-sans);
  }
  #result-area.correct  { background: #eafaf0; border: 1.5px solid #a8dbb8; color: #1a5a30; }
  #result-area.incorrect{ background: #fdf0ef; border: 1.5px solid #f0b8b0; color: #7a1a10; }
  #result-verdict { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
  #correct-answer { margin-bottom: 6px; }
  #explanation-text { opacity: 0.85; }

  #next-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: var(--accent);
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #next-btn:active { transform: scale(0.98); }

  /* 頂上画面 */
  #summit-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,8,4,0.7);
    padding: 32px 24px;
    text-align: center;
  }
  #summit-screen.show { display: flex; }
  #summit-title {
    font-family: var(--font-serif);
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 12px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  #summit-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 32px;
    line-height: 1.8;
    white-space: pre-line;
  }
  #restart-btn {
    padding: 14px 40px;
    background: var(--accent);
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- 背景：sky.png 1枚 -->
<div id="bg-layer">
  <img id="bg-img" src="back001.png" alt="">
</div>

<!-- 崖：透過PNGを前面に重ねて繰り返し -->
<div id="cliff-layer">
  <div id="cliff-strip"></div>
</div>

<div id="ground"></div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="counter"></div>

<div id="quiz-overlay">
  <div id="quiz-card">
    <div class="card-label">問題</div>
    <div id="question-text"></div>
    <input type="text" id="answer-input" placeholder="答えを入力してください"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="submit-btn" onclick="checkAnswer()">答え合わせ</button>
    <div id="result-area">
      <div id="result-verdict"></div>
      <div id="correct-answer"></div>
      <div id="explanation-text"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">次の問題へ登る ↑</button>
  </div>
</div>

<div id="summit-screen">
  <div id="summit-title">🏔 頂上到達！</div>
  <div id="summit-sub"></div>
  <button id="restart-btn" onclick="restartQuiz()">もう一度挑戦する</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  問題データ
//  a  : 正解（完全一致判定）
//  alt: 別解（あれば）
// ═══════════════════════════════════════════════
const QUESTIONS = [
  {
    q: "VBAでセルA1の値を取得するコードを書いてください。",
    a: "1",
    alt: ["Cells(1,1).Value"],
    explanation: "Range(\"A1\").Value または Cells(1,1).Value でセルA1の値を取得できます。"
  },
  {
    q: "VBAでメッセージボックスに「Hello」と表示するコードを書いてください。",
    a: "1",
    alt: ["MsgBox(\"Hello\")"],
    explanation: "MsgBox 関数はダイアログボックスにメッセージを表示します。"
  },
  {
    q: "変数 x を整数型で宣言するコードを書いてください。",
    a: "1",
    alt: [],
    explanation: "Dim 変数名 As データ型 の形式で変数を宣言します。整数型は Integer です。"
  },
  {
    q: "VBAでFor i = 1 To 10のループを終了するキーワードは何ですか？",
    a: "1",
    alt: ["Next"],
    explanation: "For～NextループはNext（または Next 変数名）でループブロックを閉じます。"
  },
  {
    q: "VBAでコメントを書くときに行頭に使う記号は何ですか？",
    a: "1",
    alt: ["' （アポストロフィ）", "アポストロフィ"],
    explanation: "VBAではアポストロフィ（'）以降の文字がコメントとして扱われます。"
  }
];

// ═══════════════════════════════════════════════
//  設定値
//  CLIFF_PANEL_H : 崖パネル1枚の高さ(px)。
//                  cliff.png の縦サイズに合わせると
//                  ちょうど1枚ぶん表示される。
//  SKY_SCROLL_PX : 正解1回あたり背景をスクロールするpx。
//                  sky.png の高さ ÷ 問題数 が目安。
// ═══════════════════════════════════════════════
const CLIFF_PANEL_H  = 400;   // cliff.png の縦px に合わせる
const SKY_SCROLL_PX  = 200;   // 背景スクロール量（小さいほどゆっくり）
const TOTAL_PANELS   = 5;    // 崖パネル枚数（問題数より多めに）

// ── 状態 ──
let questions    = [];
let currentIdx   = 0;
let correctCount = 0;
let isAnimating  = false;
let cliffOffset  = 0;   // 崖ストリップの累積移動量(px)
let skyOffset    = 0;   // 背景の累積移動量(px)

// ── 初期化 ──
function init() {
  questions    = shuffle([...QUESTIONS]);
  currentIdx   = 0;
  correctCount = 0;
  cliffOffset  = 0;
  skyOffset    = 0;

  // 背景リセット
  document.getElementById('bg-img').style.transform = 'translateY(0px)';

  buildCliff();
  showQuestion();
  updateUI();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 崖パネルを組み立てる
function buildCliff() {
  const strip = document.getElementById('cliff-strip');
  strip.innerHTML = '';
  strip.style.transform = 'translateY(0px)';

// 通常パネルを先に追加（column-reverseで下に積まれる）
  const extraPanels = Math.ceil(window.innerHeight / CLIFF_PANEL_H) + 1;
  for (let i = 0; i < TOTAL_PANELS + extraPanels; i++) {
    const panel = document.createElement('div');
    panel.className = 'cliff-panel';
    panel.style.height = CLIFF_PANEL_H + 'px';
    strip.appendChild(panel);
  }

  // 頂上パネルを最後に追加（column-reverseで一番上に来る）
  const summit = document.createElement('div');
  summit.className = 'cliff-panel summit';
  summit.style.height = CLIFF_PANEL_H + 'px';
  strip.appendChild(summit);
}

// ── 問題表示 ──
function showQuestion() {
  const q = questions[currentIdx];
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('submit-btn').textContent = '答え合わせ';
  document.getElementById('submit-btn').onclick = checkAnswer;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('result-area').className = '';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('quiz-card').classList.remove('hidden', 'scrolling');
  setTimeout(() => document.getElementById('answer-input').focus(), 120);
}

// ── 採点 ──
function normalize(s) {
  return s.trim().replace(/\s+/g, ' ').toLowerCase();
}

function checkAnswer() {
  const input  = document.getElementById('answer-input').value;
  const q      = questions[currentIdx];
  const userAns = normalize(input);
  const correct = normalize(q.a);
  const alts    = (q.alt || []).map(normalize);
  const isCorrect = userAns === correct || alts.includes(userAns);

  document.getElementById('answer-input').disabled = true;
  document.getElementById('submit-btn').disabled   = true;

  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'block';
  resultArea.className     = isCorrect ? 'correct' : 'incorrect';
  document.getElementById('result-verdict').textContent =
    isCorrect ? '✓ 正解！' : '✗ 不正解';
  document.getElementById('correct-answer').textContent =
    isCorrect ? '' : '正解：' + q.a;
  document.getElementById('explanation-text').textContent = q.explanation;

  if (isCorrect) {
    correctCount++;
    const isLast = currentIdx >= questions.length - 1;
    document.getElementById('next-btn').style.display  = 'block';
    document.getElementById('next-btn').textContent    =
      isLast ? '頂上へ！ ↑' : '次の問題へ登る ↑';
  } else {
    document.getElementById('submit-btn').textContent  = 'もう一度挑戦する';
    document.getElementById('submit-btn').disabled     = false;
    document.getElementById('submit-btn').onclick      = retryQuestion;
  }
}

function retryQuestion() {
  document.getElementById('answer-input').value   = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('submit-btn').textContent = '答え合わせ';
  document.getElementById('submit-btn').onclick     = checkAnswer;
  document.getElementById('submit-btn').disabled    = false;
  setTimeout(() => document.getElementById('answer-input').focus(), 100);
}

// ── 次の問題・スクロール ──
function nextQuestion() {
  if (isAnimating) return;

  // 最後の問題なら即座に頂上へ
  if (currentIdx >= questions.length - 1) {
    document.getElementById('quiz-card').classList.add('scrolling');
    cliffOffset += CLIFF_PANEL_H;
    document.getElementById('cliff-strip').style.transform =
      `translateY(${cliffOffset}px)`;
    skyOffset += SKY_SCROLL_PX;
    document.getElementById('bg-img').style.transform =
      `translateY(${skyOffset}px)`;
    setTimeout(() => { showSummit(); }, 1100);
    return;
  }

  isAnimating = true;

  // カードを隠す
  document.getElementById('quiz-card').classList.add('scrolling');

  // 崖：下から上へスクロール（translateY を増やす＝上へ）
  cliffOffset += CLIFF_PANEL_H;
  document.getElementById('cliff-strip').style.transform =
    `translateY(${cliffOffset}px)`;

  // 背景：translateY をマイナス方向に動かす＝上へスクロール
  skyOffset += SKY_SCROLL_PX;
  document.getElementById('bg-img').style.transform =
    `translateY(${skyOffset}px)`;

  setTimeout(() => {
    currentIdx++;
    updateUI();
    if (currentIdx >= questions.length) {
      showSummit();
    } else {
      showQuestion();
    }
    isAnimating = false;
  }, 1100);
}

function updateUI() {
  const total = questions.length;
  const pct   = Math.round((correctCount / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('counter').textContent =
    `${Math.min(currentIdx + 1, total)} / ${total}`;
}

function showSummit() {
  document.getElementById('quiz-card').classList.add('hidden');
  document.getElementById('summit-screen').classList.add('show');
  document.getElementById('summit-sub').textContent =
    `全${questions.length}問中 ${correctCount}問正解！\n見事、山頂に辿り着きました。`;
}

function restartQuiz() {
  document.getElementById('summit-screen').classList.remove('show');
  init();
}

// Enterキーで答え合わせ
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) {
    document.getElementById('submit-btn').click();
  }
});

init();
</script>
</body>
</html>
