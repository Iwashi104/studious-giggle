<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>崖登りクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cliff-w: 44%;
    --sky-w: 56%;
    --panel-h: 280px;
    --accent: #e8c87a;
    --accent-dark: #b8923a;
    --danger: #c0392b;
    --success: #27ae60;
    --text-main: #1a1209;
    --text-light: #f5f0e8;
    --overlay-bg: rgba(15, 10, 5, 0.82);
    --card-bg: rgba(245, 240, 230, 0.97);
    --font-serif: 'Noto Serif JP', serif;
    --font-sans: 'Noto Sans JP', sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d0a06;
    font-family: var(--font-sans);
    color: var(--text-main);
  }

  /* ── WORLD ── */
  #world {
    position: fixed;
    inset: 0;
    display: flex;
    overflow: hidden;
  }

  /* 左：崖 */
  #cliff-col {
    width: var(--cliff-w);
    height: 100%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  #cliff-strip {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column-reverse;
    transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
  }
  .cliff-panel {
    width: 100%;
    height: var(--panel-h);
    flex-shrink: 0;
    background: #5a4a3a;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 2px solid rgba(255,255,255,0.07);
  }
  /* ダミー崖テクスチャ（SVGパターン） */
  .cliff-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        88deg,
        transparent 0px, transparent 18px,
        rgba(0,0,0,0.12) 18px, rgba(0,0,0,0.12) 20px
      ),
      repeating-linear-gradient(
        2deg,
        transparent 0px, transparent 40px,
        rgba(255,255,255,0.04) 40px, rgba(255,255,255,0.04) 42px
      );
  }
  .cliff-panel.summit {
    background: linear-gradient(180deg, #8aab6e 0%, #6a8a4e 60%, #5a7a3e 100%);
  }
  .cliff-panel.summit::before { display: none; }

  /* 右：遠景 */
  #sky-col {
    flex: 1;
    height: 100%;
    position: relative;
    overflow: hidden;
  }
  #sky-strip {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column-reverse;
    transition: transform 1.4s cubic-bezier(0.4,0,0.2,1);
  }
  .sky-panel {
    width: 100%;
    height: var(--panel-h);
    flex-shrink: 0;
    position: relative;
  }
  /* ダミー空・遠景グラデーション */
  .sky-panel:nth-child(1)  { background: linear-gradient(180deg,#1a3a5c 0%,#2a5a8c 100%); }
  .sky-panel:nth-child(2)  { background: linear-gradient(180deg,#1e4060 0%,#2d6090 100%); }
  .sky-panel:nth-child(3)  { background: linear-gradient(180deg,#234868 0%,#3268a0 100%); }
  .sky-panel:nth-child(4)  { background: linear-gradient(180deg,#2a5070 0%,#3870a8 100%); }
  .sky-panel:nth-child(5)  { background: linear-gradient(180deg,#306080 0%,#4080b8 100%); }
  .sky-panel:nth-child(6)  { background: linear-gradient(180deg,#3870a0 0%,#4898c8 100%); }
  .sky-panel:nth-child(7)  { background: linear-gradient(180deg,#4080b0 0%,#58a8d8 100%); }
  .sky-panel:nth-child(8)  { background: linear-gradient(180deg,#5090c0 0%,#68b8e0 100%); }
  .sky-panel:nth-child(9)  { background: linear-gradient(180deg,#60a0d0 0%,#78c8e8 100%); }
  .sky-panel:nth-child(10) { background: linear-gradient(180deg,#70b0dc 0%,#a8d8f0 100%); }
  /* 頂上パネル */
  .sky-panel.summit { background: linear-gradient(180deg,#ffeaa0 0%,#ffd060 60%,#ffb030 100%); }

  /* 雲っぽい装飾 */
  .sky-panel::after {
    content: '';
    position: absolute;
    left: 10%; top: 30%;
    width: 60%; height: 30%;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    filter: blur(12px);
  }

  /* 地面ライン */
  #ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%);
    border-top: 2px solid rgba(255,255,255,0.1);
    z-index: 5;
  }

  /* 進行バー */
  #progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.8s ease;
  }

  /* 問題カウンター */
  #counter {
    position: fixed;
    top: 12px; right: 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-family: var(--font-sans);
    z-index: 100;
    letter-spacing: 0.05em;
  }

  /* ── クイズオーバーレイ ── */
  #quiz-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: flex-end;
    padding: 0 0 60px 0;
    pointer-events: none;
  }
  #quiz-card {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 20px;
    pointer-events: all;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    transform: translateY(0);
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
  }
  #quiz-card.hidden {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--font-sans);
  }
  #question-text {
    font-family: var(--font-serif);
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-main);
    margin-bottom: 16px;
    min-height: 48px;
  }
  #answer-input {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: var(--font-sans);
    border: 1.5px solid #d0c8b8;
    border-radius: 10px;
    background: #fff;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #answer-input:focus { border-color: var(--accent-dark); }
  #answer-input:disabled { background: #f0ece4; color: #888; }

  #submit-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: var(--text-main);
    color: var(--text-light);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.4; cursor: default; }

  /* 結果表示 */
  #result-area {
    display: none;
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    font-family: var(--font-sans);
  }
  #result-area.correct {
    background: #eafaf0;
    border: 1.5px solid #a8dbb8;
    color: #1a5a30;
  }
  #result-area.incorrect {
    background: #fdf0ef;
    border: 1.5px solid #f0b8b0;
    color: #7a1a10;
  }
  #result-verdict {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
  }
  #correct-answer { margin-bottom: 6px; }
  #explanation-text { color: inherit; opacity: 0.85; }

  #next-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: var(--accent);
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #next-btn:active { transform: scale(0.98); }

  /* ── 頂上画面 ── */
  #summit-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,8,4,0.7);
    padding: 32px 24px;
    text-align: center;
  }
  #summit-screen.show { display: flex; }
  #summit-title {
    font-family: var(--font-serif);
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 12px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  #summit-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  #restart-btn {
    padding: 14px 40px;
    background: var(--accent);
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  /* スクロールアニメ中の非表示 */
  #quiz-card.scrolling {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="world">
  <div id="cliff-col"><div id="cliff-strip"></div></div>
  <div id="sky-col"><div id="sky-strip"></div></div>
</div>
<div id="ground"></div>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="counter"></div>

<div id="quiz-overlay">
  <div id="quiz-card">
    <div class="card-label">問題</div>
    <div id="question-text"></div>
    <input type="text" id="answer-input" placeholder="答えを入力してください" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="submit-btn" onclick="checkAnswer()">答え合わせ</button>
    <div id="result-area">
      <div id="result-verdict"></div>
      <div id="correct-answer"></div>
      <div id="explanation-text"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">次の問題へ登る ↑</button>
  </div>
</div>

<div id="summit-screen">
  <div id="summit-title">🏔 頂上到達！</div>
  <div id="summit-sub">全問正解！<br>見事、山頂に辿り着きました。</div>
  <button id="restart-btn" onclick="restartQuiz()">もう一度挑戦する</button>
</div>

<script>
// ── 問題データ（JSONで差し替え可能な構造） ──
const QUESTIONS = [
  {
    q: "VBAでセルA1の値を取得するコードを書いてください。",
    a: "Range(\"A1\").Value",
    alt: ["Cells(1,1).Value"],
    explanation: "Range(\"A1\").Value または Cells(1,1).Value でセルA1の値を取得できます。"
  },
  {
    q: "VBAでメッセージボックスに「Hello」と表示するコードを書いてください。",
    a: "MsgBox \"Hello\"",
    alt: ["MsgBox(\"Hello\")"],
    explanation: "MsgBox 関数はダイアログボックスにメッセージを表示します。引数に表示したい文字列を渡します。"
  },
  {
    q: "変数 x を整数型で宣言するコードを書いてください。",
    a: "Dim x As Integer",
    alt: [],
    explanation: "Dim 変数名 As データ型 の形式で変数を宣言します。整数型は Integer です。"
  },
  {
    q: "VBAでFor i = 1 To 10のループを終了するキーワードは何ですか？",
    a: "Next i",
    alt: ["Next"],
    explanation: "For～NextループはNext（または Next 変数名）でループブロックを閉じます。"
  },
  {
    q: "VBAでコメントを書くときに行頭に使う記号は何ですか？",
    a: "'",
    alt: ["' （アポストロフィ）", "アポストロフィ"],
    explanation: "VBAではアポストロフィ（'）以降の文字がコメントとして扱われます。"
  }
];

// ── 状態 ──
let questions = [];
let currentIdx = 0;
let correctCount = 0;
let isAnimating = false;
let cliffOffset = 0;
let skyOffset = 0;

const CLIFF_STEP = 280;
const SKY_STEP = 160;
const TOTAL_PANELS = 12;

// ── 初期化 ──
function init() {
  questions = shuffle([...QUESTIONS]);
  currentIdx = 0;
  correctCount = 0;
  cliffOffset = 0;
  skyOffset = 0;
  buildWorld();
  showQuestion();
  updateUI();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildWorld() {
  const cliffStrip = document.getElementById('cliff-strip');
  const skyStrip = document.getElementById('sky-strip');
  cliffStrip.innerHTML = '';
  skyStrip.innerHTML = '';

  // 頂上パネル + 通常パネル × TOTAL_PANELS
  for (let i = 0; i <= TOTAL_PANELS; i++) {
    const cp = document.createElement('div');
    cp.className = 'cliff-panel' + (i === TOTAL_PANELS ? ' summit' : '');
    cp.style.height = CLIFF_STEP + 'px';
    if (i === TOTAL_PANELS) cp.innerHTML = '<span style="color:#fff;font-size:24px">🏔</span>';
    cliffStrip.appendChild(cp);

    const sp = document.createElement('div');
    sp.className = 'sky-panel' + (i === TOTAL_PANELS ? ' summit' : '');
    sp.style.height = CLIFF_STEP + 'px';
    skyStrip.appendChild(sp);
  }

  document.getElementById('cliff-strip').style.transform = 'translateY(0)';
  document.getElementById('sky-strip').style.transform = 'translateY(0)';
}

// ── 問題表示 ──
function showQuestion() {
  const q = questions[currentIdx];
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('result-area').className = '';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('quiz-card').classList.remove('hidden', 'scrolling');
  setTimeout(() => document.getElementById('answer-input').focus(), 100);
}

// ── 採点 ──
function normalize(s) {
  return s.trim().replace(/\s+/g, ' ').toLowerCase();
}

function checkAnswer() {
  const input = document.getElementById('answer-input').value;
  const q = questions[currentIdx];
  const userAns = normalize(input);
  const correct = normalize(q.a);
  const alts = (q.alt || []).map(normalize);

  const isCorrect = userAns === correct || alts.includes(userAns);

  document.getElementById('answer-input').disabled = true;
  document.getElementById('submit-btn').disabled = true;

  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'block';
  resultArea.className = isCorrect ? 'correct' : 'incorrect';
  document.getElementById('result-verdict').textContent = isCorrect ? '✓ 正解！' : '✗ 不正解';
  document.getElementById('correct-answer').textContent = isCorrect ? '' : '正解：' + q.a;
  document.getElementById('explanation-text').textContent = q.explanation;

  if (isCorrect) {
    correctCount++;
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('next-btn').textContent =
      currentIdx + 1 >= questions.length ? '頂上へ！ ↑' : '次の問題へ登る ↑';
  } else {
    // 不正解：再挑戦ボタン
    document.getElementById('submit-btn').textContent = 'もう一度挑戦する';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').onclick = retryQuestion;
  }
}

function retryQuestion() {
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('submit-btn').textContent = '答え合わせ';
  document.getElementById('submit-btn').onclick = checkAnswer;
  document.getElementById('submit-btn').disabled = false;
  setTimeout(() => document.getElementById('answer-input').focus(), 100);
}

// ── 次の問題・スクロール ──
function nextQuestion() {
  if (isAnimating) return;
  isAnimating = true;

  // カードを隠す
  const card = document.getElementById('quiz-card');
  card.classList.add('scrolling');

  // パララックススクロール
  cliffOffset += CLIFF_STEP;
  skyOffset += SKY_STEP;
  document.getElementById('cliff-strip').style.transform = `translateY(${cliffOffset}px)`;
  document.getElementById('sky-strip').style.transform = `translateY(${skyOffset}px)`;

  setTimeout(() => {
    currentIdx++;
    updateUI();
    if (currentIdx >= questions.length) {
      showSummit();
    } else {
      showQuestion();
    }
    isAnimating = false;
  }, 1000);
}

function updateUI() {
  const total = questions.length;
  const done = correctCount;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = `${Math.min(currentIdx + 1, total)} / ${total}`;
}

function showSummit() {
  document.getElementById('quiz-card').classList.add('hidden');
  document.getElementById('summit-screen').classList.add('show');
  document.getElementById('summit-sub').textContent =
    `全${questions.length}問中 ${correctCount}問正解！\n見事、山頂に辿り着きました。`;
}

function restartQuiz() {
  document.getElementById('summit-screen').classList.remove('show');
  init();
}

// Enterキーで答え合わせ
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) {
    document.getElementById('submit-btn').click();
  }
});

init();
</script>
</body>
</html>
